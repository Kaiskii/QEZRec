name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download FFmpeg
        run: |
          curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          7z x ffmpeg.zip -offmpeg_extract
          copy ffmpeg_extract\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe ffmpeg.exe

      - name: Build .exe (with FFmpeg)
        run: |
          python -m PyInstaller --onefile --name QEZRec --noconsole --hidden-import comtypes.stream --hidden-import pyaudiowpatch --collect-all windows_capture --collect-all pyaudiowpatch --add-data "assets/qezico.png;." --icon assets/qezico.ico --add-binary "ffmpeg.exe;." run.py

      - name: Build .exe (without FFmpeg)
        run: |
          python -m PyInstaller --onefile --name QEZRec-lite --noconsole --hidden-import comtypes.stream --hidden-import pyaudiowpatch --collect-all windows_capture --collect-all pyaudiowpatch --add-data "assets/qezico.png;." --icon assets/qezico.ico run.py

      - name: Generate checksums
        run: |
          cd dist
          certutil -hashfile QEZRec.exe SHA256 | findstr /v "hash" > QEZRec.exe.sha256
          certutil -hashfile QEZRec-lite.exe SHA256 | findstr /v "hash" > QEZRec-lite.exe.sha256
          type QEZRec.exe.sha256
          type QEZRec-lite.exe.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: QEZRec-windows
          path: |
            dist/QEZRec.exe
            dist/QEZRec-lite.exe
            dist/*.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/QEZRec.exe
            dist/QEZRec-lite.exe
            dist/*.sha256
          body: |
            ## QEZRec ${{ github.ref_name }}

            ### Downloads
            - **QEZRec.exe** - Full bundle with FFmpeg included. Just download and run.
            - **QEZRec-lite.exe** - Lightweight. Requires [FFmpeg](https://ffmpeg.org/download.html) in PATH.
            - **SHA256 checksums** included for verification.

            ### Usage
            ```
            QEZRec.exe
            ```
            - **Ctrl+Shift+R** - Start/stop recording
            - **Ctrl+Shift+Q** - Cancel recording (discard file)

            Recordings saved to `%USERPROFILE%\Videos\QEZRec\`
          generate_release_notes: true
